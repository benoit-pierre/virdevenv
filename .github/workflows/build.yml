name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      images:
        description: 'Build the specified images'
        required: false
        type: string
      publish:
        description: 'Force enable/disable publication: must be a boolean like value'
        require: false
        type: string

defaults:
  run:
    shell: bash


env:
  REGISTRY: ghcr.io
  USERNAME: ${{ github.actor }}


jobs:


  prepare:

    name: Prepare
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          show-progress: false

      - name: Install regctl
        run: ./.ci/install_regctl.sh

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate outputs
        id: generate
        run: |
          set -x
          images=(${{ inputs.images && inputs.images || '""' }})
          make -s -C docker/ubuntu REGISTRY=${{ env.REGISTRY }} USER=${{ env.USERNAME }} ${images[@]/#/ci-matrix/} | tee base_matrix
          sed -i 's/^/[ /;s/, $/ ]\n/' base_matrix; cat base_matrix
          jq --color-output <base_matrix
          publish="${{ inputs.publish && fromJSON(inputs.publish) && true || github.ref == 'refs/heads/master' }}"
          if [[ "${publish}" == 'true' ]]; then
            # Just strip `.base` members.
            jq <base_matrix >final_matrix '[ .[] | .base |= select(false) ]'
          else
            jq <base_matrix >final_matrix '
              # Save a reference to top object.
              . as $o |
              # Build a mapping of images being built.
              [ .[] | { key: (.image), value: true } ] | from_entries as $images |
              # And produce an updated version of the top object input with
              # each `.base` member stripped when not one the built images.
              # NOTE: we also convert an image base name to its build ID.
              [$o | .[] | .base |= (select(. as $i | $images | has($i)) |
                                    ltrimstr("${{ env.REGISTRY }}/${{ env.USERNAME }}/") |
                                    gsub("[/:]"; " ")) ]
              '
          fi
          jq --color-output <final_matrix
          jq --compact-output <final_matrix | sed 's/^/matrix=/' | tee -a "${GITHUB_OUTPUT}"
          printf '%s=%s\n' 'publish' "${publish}" | tee -a "${GITHUB_OUTPUT}"

    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      publish: ${{ steps.generate.outputs.publish }}
      registry: ${{ env.REGISTRY }}
      username: ${{ env.USERNAME }}


  build:

    needs: prepare
    if: needs.prepare.outputs.matrix

    permissions:
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    name: Build ${{ matrix.id }}

    uses: ./.github/workflows/build.image.yml
    with:
      id: ${{ matrix.id }}
      image: ${{ matrix.image }}
      base: ${{ matrix.base }}
      platform: ${{ matrix.platform }}
      publish: ${{ fromJSON(needs.prepare.outputs.publish) }}
      # NOTE: can't use `${{ env.XXX }}` here…
      registry: ${{ needs.prepare.outputs.registry }}
      username: ${{ needs.prepare.outputs.username }}
